<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>kidSAFE Compliance Guide — Authoring</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    /* ---------- App shell ---------- */
    :root {
      --navy-800: #0F1648;
      --navy-700: #1a2466;
      --navy-600: #2a3a8a;
      --navy-100: #e8eaf4;
      --paper:    #f0eee9;
      --panel:    #ffffff;
      --ink:      #1a2333;
      --ink-mute: rgba(26, 35, 51, 0.6);
      --rule:     rgba(15, 22, 72, 0.08);
      --rule-2:   rgba(15, 22, 72, 0.16);
      --peach:    #f7a96d;
      --peach-soft: #fcf0e4;
      --green:    #4d9d5a;
      --red:      #d06a67;
      --amber:    #d9a535;
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--paper);
      font-family: var(--font-body, "Work Sans", system-ui, sans-serif);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }

    .app {
      display: grid;
      grid-template-columns: minmax(420px, 44%) 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "topbar topbar"
        "form   preview";
      height: 100vh;
      width: 100vw;
    }

    .topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 22px;
      background: #fff;
      border-bottom: 1px solid var(--rule);
      box-shadow: 0 1px 0 rgba(15, 22, 72, 0.02);
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--navy-800); }
    .topbar-brand img { height: 28px; }
    .topbar-brand .divider { width: 1px; height: 18px; background: var(--rule-2); }
    .topbar-title { font-weight: 600; font-size: 15px; }
    .topbar-sub   { font-size: 13px; color: var(--ink-mute); font-weight: 500; }
    .topbar-sep   { flex: 1; }

    .topbar-status {
      font-size: 12px;
      color: var(--ink-mute);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-status .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    }
    .topbar-actions { display: flex; gap: 8px; }
    .btn {
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 13px;
      border-radius: 6px;
      border: 1px solid var(--rule-2);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: var(--navy-100); }
    .btn-primary { background: var(--navy-800); color: #fff; border-color: var(--navy-800); }
    .btn-primary:hover { background: var(--navy-700); }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-mute); }
    .btn-ghost:hover { background: var(--navy-100); color: var(--ink); }

    /* ---------- Form column ---------- */
    .form-col {
      grid-area: form;
      overflow-y: auto;
      padding: 0;
      background: var(--paper);
      border-right: 1px solid var(--rule);
    }
    .form-inner {
      padding: 24px 28px 60px;
      max-width: 680px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--rule);
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
    }
    .section-head:hover { background: rgba(15, 22, 72, 0.02); }
    .section[data-open="true"] > .section-head { border-bottom-color: var(--rule); }
    .section-head-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-num {
      font-family: var(--font-display, "DM Serif Display", Georgia, serif);
      color: var(--navy-800);
      font-size: 18px;
      line-height: 1;
      min-width: 24px;
      opacity: 0.5;
    }
    .section-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--navy-800);
    }
    .section-desc {
      font-size: 12px;
      color: var(--ink-mute);
      margin-top: 2px;
    }
    .section-head-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-badge {
      font-size: 11px;
      color: var(--ink-mute);
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(15, 22, 72, 0.05);
      font-weight: 500;
    }
    .section-badge.filled {
      background: rgba(77, 157, 90, 0.12);
      color: var(--green);
    }
    .section-caret {
      color: var(--ink-mute);
      transition: transform 0.15s ease;
      font-size: 12px;
    }
    .section[data-open="true"] .section-caret { transform: rotate(90deg); }

    .section-body {
      padding: 10px 16px 18px;
      display: none;
    }
    .section[data-open="true"] .section-body { display: block; }

    /* ---------- Fields ---------- */
    .field {
      display: block;
      margin-bottom: 12px;
    }
    .field-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }
    .field-hint {
      font-size: 11px;
      color: var(--ink-mute);
      font-weight: 400;
      margin-left: 8px;
    }
    .field input[type="text"],
    .field textarea,
    .field select {
      width: 100%;
      font: inherit;
      font-size: 13px;
      color: var(--ink);
      padding: 7px 10px;
      border: 1px solid var(--rule-2);
      border-radius: 5px;
      background: #fff;
      resize: vertical;
    }
    .field textarea { min-height: 58px; line-height: 1.4; }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: 2px solid rgba(15, 22, 72, 0.2);
      outline-offset: 1px;
      border-color: var(--navy-800);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    /* ---------- Repeating items (legislation, requirements, tiles, steps, citations) ---------- */
    .item {
      border: 1px solid var(--rule-2);
      border-radius: 8px;
      padding: 12px 12px 8px;
      margin-bottom: 10px;
      background: #fff;
      position: relative;
    }
    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .item-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--navy-800);
      letter-spacing: 0.08em;
    }
    .item-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none;
      border: 0;
      cursor: pointer;
      color: var(--ink-mute);
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .icon-btn:hover { background: var(--navy-100); color: var(--ink); }
    .icon-btn.danger:hover { background: rgba(208, 106, 103, 0.1); color: var(--red); }

    .add-item {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--rule-2);
      border-radius: 6px;
      color: var(--ink-mute);
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .add-item:hover {
      border-color: var(--navy-800);
      color: var(--navy-800);
      background: rgba(15, 22, 72, 0.02);
    }

    /* Status select visual chip */
    .status-select {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .status-dot.s-active   { background: var(--green); }
    .status-dot.s-blocked  { background: var(--red); }
    .status-dot.s-watch    { background: var(--amber); }
    .status-dot.s-monitor  { background: #888; }

    /* ---------- Preview column ---------- */
    .preview-col {
      grid-area: preview;
      position: relative;
      overflow: hidden;
      background: #e9e6df;
    }
    .preview-toolbar {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      font-size: 12px;
    }
    .preview-toolbar button {
      background: none;
      border: 0;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      color: var(--ink-mute);
      font: inherit;
      font-size: 12px;
    }
    .preview-toolbar button.active {
      background: var(--navy-800);
      color: #fff;
    }
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--paper);
    }

    /* Draft list / empty state */
    .intro-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 16px;
    }
    .intro-card h2 {
      margin: 0 0 8px;
      font-family: var(--font-display, "DM Serif Display", Georgia, serif);
      font-weight: 400;
      color: var(--navy-800);
      font-size: 22px;
      line-height: 1.15;
    }
    .intro-card p {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--ink-mute);
      line-height: 1.5;
    }
    .intro-card .intro-foot {
      margin-top: 14px;
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap;
    }

    /* Tiny toast */
    .toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--navy-800);
      color: #fff;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script type="text/babel" src="./authoring/AuthoringForm.jsx"></script>
  <script type="text/babel" src="./authoring/App.jsx"></script>
</body>
</html>
